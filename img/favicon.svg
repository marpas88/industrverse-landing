<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#fff"/>
  <!-- I — czarna pionowa belka -->
  <rect x="6" y="8" width="14" height="84" rx="2" fill="#111"/>
  <!-- V — zielony lewy bok (skos w lewo-dół) -->
  <polygon points="20,8 34,8 50,70 36,70" fill="#4caf50"/>
  <!-- V — dolny czubek -->
  <polygon points="36,70 50,70 44,92 30,92" fill="#4caf50"/>
  <!-- R — pozioma belka górna (prawa część) -->
  <polygon points="50,8 94,8 94,22 50,22" fill="#4caf50"/>
  <!-- R — pionowa belka prawa -->
  <polygon points="80,8 94,8 94,58 80,58" fill="#4caf50"/>
  <!-- R — środkowa belka pozioma -->
  <polygon points="50,44 94,44 94,58 50,58" fill="#4caf50"/>
  <!-- R — skośna noga w prawo-dół -->
  <polygon points="66,58 80,58 94,92 80,92" fill="#4caf50"/>
</svg>
